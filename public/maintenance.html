<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="images/logo/QIA-Logo-White.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sustaino-AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #303e48;
            --light: #f4f6f9;
            --accent: #d9e5ef;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Manrope", sans-serif;
            background: var(--light);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background-color: rgba(48, 62, 72, 1);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 50px;
            margin-bottom: -28px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
            margin-right: 10px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
            font-weight: 700;
            color: var(--light);
            position: relative;
            display: inline-block;
        }

        h1:after {
            content: "";
            position: absolute;
            width: 70%;
            height: 4px;
            background-color: var(--light);
            bottom: -10px;
            left: 15%;
            border-radius: 2px;
        }

        p {
            font-size: 1.25em;
            margin-top: 1.5em;
            line-height: 1.6;
            color: var(--light);
        }

        .spinner-container {
            margin-top: 2.5em;
            position: relative;
        }

        .spinner {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .spinner:before,
        .spinner:after {
            content: "";
            position: absolute;
            border-radius: 50%;
        }

        .spinner:before {
            width: 100%;
            height: 100%;
            background: conic-gradient(var(--primary),
                    var(--accent),
                    var(--primary));
            animation: spin 1.2s linear infinite;
        }

        .spinner:after {
            width: 80%;
            height: 80%;
            background: var(--light);
            top: 10%;
            left: 10%;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            border-radius: 50%;
        }

        .shape-1 {
            background-color: var(--accent);
            width: 300px;
            height: 300px;
            top: -150px;
            left: -100px;
        }

        .shape-2 {
            background-color: var(--primary);
            width: 400px;
            height: 400px;
            bottom: -200px;
            right: -150px;
        }

        .shape-3 {
            background-color: var(--accent);
            width: 200px;
            height: 200px;
            top: 40%;
            right: 10%;
        }

        .shape-4 {
            background-color: var(--primary);
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 15%;
        }

        .status-indicator {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.5rem 1.2rem;
            background-color: rgba(48, 62, 72, 0.1);
            border-radius: 30px;
            border-color: var(--accent);
            border-style: solid;
            font-size: 0.9em;
            font-weight: 500;
            color: var(--light);
        }

        .status-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #28c76f;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9em;
            color: #555;
            z-index: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem;
            }

            h1 {
                font-size: 2.2em;
            }

            p {
                font-size: 1.1em;
            }
        }
    </style>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <div class="container">
        <img src="/images/logo/QIA-Logo-White.png" alt="Sustaino-AI Logo" class="logo" />
        <h1>Upgrading Your Experience</h1>
        <p>
            Sustaino-AI is currently being enhanced with new features and
            improvements. We'll be back online shortly with a more powerful
            experience.
        </p>
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>
        <div class="status-indicator"><span></span>Update in progress</div>
    </div>

    <footer id="footer-year"></footer>
</body>
<script>
    const year = new Date().getFullYear();
    document.getElementById(
        "footer-year"
    ).innerHTML = `&copy; ${year} Sustaino-AI, Powered by <a href="https://gord.qa" target="_blank">GORD</a>`;

    setInterval(() => {
        location.reload();
    }, 60000);
</script>

</html>
