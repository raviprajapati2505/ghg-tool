name: Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint || true

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ghg
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export NVM_DIR="/var/www/ghg.sustainoai.com/.nvm"
            source "$NVM_DIR/nvm.sh"
            
            cd /var/www/ghg.sustainoai.com/application
            git pull origin main
            npm install
            npm run build
            
            pm2 restart ghg-app --update-env || pm2 start /var/www/ghg.sustainoai.com/ecosystem.config.js
            pm2 save
